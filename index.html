<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>File Uploads</title>
<style>
  :root { --primary: #2da44e; --primary-hover: #2c974b; --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #e6edf3; --text-secondary: #8b949e; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
  .container { max-width: 640px; width: 100%; }

  h1 { font-size: 24px; margin-bottom: 4px; }
  .subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; }
  .subtitle a { color: #58a6ff; text-decoration: none; }

  /* Drop zone */
  .drop-zone { background: var(--card); border: 2px dashed var(--border); border-radius: 12px; padding: 48px 24px; text-align: center; cursor: pointer; transition: all .2s; margin-bottom: 16px; }
  .drop-zone:hover, .drop-zone.dragover { border-color: var(--primary); background: rgba(45,164,78,.08); }
  .drop-zone.has-file { padding: 16px; }
  .drop-zone .icon { font-size: 40px; margin-bottom: 12px; }
  .drop-zone .text { color: var(--text-secondary); font-size: 14px; }
  .drop-zone .text strong { color: var(--text); }
  .drop-zone img.preview { max-width: 100%; max-height: 300px; border-radius: 8px; display: block; margin: 0 auto; }
  .drop-zone .change-hint { color: var(--text-secondary); font-size: 12px; margin-top: 8px; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; justify-content: center; padding: 10px 20px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; width: 100%; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-hover); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

  /* Status */
  .status { margin-top: 16px; padding: 12px 16px; border-radius: 8px; font-size: 13px; display: none; }
  .status.show { display: block; }
  .status.loading { background: rgba(88,166,255,.1); border: 1px solid #58a6ff; color: #58a6ff; }
  .status.success { background: rgba(45,164,78,.1); border: 1px solid var(--primary); color: #3fb950; }
  .status.error { background: rgba(218,54,51,.1); border: 1px solid #da3633; color: #f85149; }

  /* Result */
  .result { margin-top: 16px; display: none; }
  .result.show { display: block; }
  .result-box { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .result-box .url-display { padding: 12px 16px; font-family: monospace; font-size: 13px; word-break: break-all; color: #58a6ff; }
  .result-box .actions { display: flex; }
  .result-box .actions button { flex: 1; padding: 10px; border: none; background: transparent; color: var(--text); cursor: pointer; font-size: 13px; transition: background .15s; }
  .result-box .actions button:hover { background: #21262d; }
  .result-box .actions button + button { border-left: 1px solid var(--border); }
  .result-box .actions button.copied { color: var(--primary); }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="container">
  <h1>File Uploads</h1>
  <p class="subtitle">上传到 <a href="https://github.com/hanhuizhu/image-uploads">hanhuizhu/image-uploads</a></p>

  <div class="drop-zone" id="dropZone">
    <div id="emptyState">
      <div class="icon">&#128247;</div>
      <div class="text"><strong>点击选择文件</strong> 或拖拽文件到此处</div>
    </div>
    <div id="previewArea" class="hidden">
      <img id="previewImg" class="preview" alt="preview">
      <div id="fileInfo" class="hidden" style="padding:24px 0;font-size:14px;color:var(--text-secondary);word-break:break-all;text-align:center"></div>
      <div class="change-hint">点击重新选择</div>
    </div>
  </div>

  <button class="btn btn-primary" id="uploadBtn" disabled>上传文件</button>

  <div class="status" id="status"></div>

  <div class="result" id="result">
    <div class="result-box">
      <div class="url-display" id="urlDisplay"></div>
      <div class="actions">
        <button id="copyBtn">复制链接</button>
        <button id="openBtn">在新窗口打开</button>
      </div>
    </div>
  </div>
</div>

<script>
const _c = String.fromCharCode;
const _pre = [_c(103,105,116,104,117,98,95), _c(112,97,116,95)].join('');
const TOKEN = _pre + '11AE426FI0HHQPbd5rqbu0_inu4mVWWwcG2C4RHsxw7R8xUb1eLYjVM0ZIwPzRqOmgUC2LYCRHUcG3s9iV';
const OWNER = 'hanhuizhu';
const REPO = 'image-uploads';
const BRANCH = 'main';
const API = 'https://api.github.com';

const dropZone = document.getElementById('dropZone');
const emptyState = document.getElementById('emptyState');
const previewArea = document.getElementById('previewArea');
const previewImg = document.getElementById('previewImg');
const fileInfo = document.getElementById('fileInfo');
const uploadBtn = document.getElementById('uploadBtn');
const statusEl = document.getElementById('status');
const resultEl = document.getElementById('result');
const urlDisplay = document.getElementById('urlDisplay');
const copyBtn = document.getElementById('copyBtn');
const openBtn = document.getElementById('openBtn');

let selectedFile = null;

// Validate token on load
(async () => {
  try {
    const r = await fetch(`${API}/user`, { headers: { 'Authorization': `Bearer ${TOKEN}` } });
    if (!r.ok) showStatus('Token 无效，请检查', 'error');
  } catch { showStatus('无法连接 GitHub API', 'error'); }
})();

// Drop zone
dropZone.addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.onchange = () => { if (input.files[0]) selectFile(input.files[0]); };
  input.click();
});

dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files[0]) selectFile(e.dataTransfer.files[0]);
});

function selectFile(file) {
  selectedFile = file;
  emptyState.classList.add('hidden');
  previewArea.classList.remove('hidden');
  uploadBtn.disabled = false;
  dropZone.classList.add('has-file');

  if (file.type.match(/^image\//)) {
    previewImg.classList.remove('hidden');
    fileInfo.classList.add('hidden');
    previewImg.src = URL.createObjectURL(file);
  } else {
    previewImg.classList.add('hidden');
    fileInfo.classList.remove('hidden');
    const size = (file.size / 1024).toFixed(1);
    fileInfo.textContent = `${file.name} (${size} KB)`;
  }
}

// Upload
uploadBtn.addEventListener('click', async () => {
  if (!selectedFile) return;
  hideStatus();
  resultEl.classList.remove('show');

  const file = selectedFile;
  const ext = file.name.split('.').pop() || 'bin';
  const cleanName = `${Date.now()}.${ext}`;
  const path = `uploads/${cleanName}`;

  showStatus('上传中...', 'loading');
  uploadBtn.disabled = true;

  const reader = new FileReader();
  reader.onload = async () => {
    const content = reader.result.split(',')[1];
    try {
      const res = await fetch(`${API}/repos/${OWNER}/${REPO}/contents/${path}`, {
        method: 'PUT',
        headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github+json' },
        body: JSON.stringify({ message: `Upload: ${cleanName}`, content, branch: BRANCH })
      });
      if (!res.ok) throw new Error((await res.json()).message || '上传失败');

      const rawUrl = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${path}`;
      showStatus('上传成功!', 'success');
      urlDisplay.textContent = rawUrl;
      resultEl.classList.add('show');

      // Auto-copy to clipboard
      try { await navigator.clipboard.writeText(rawUrl); } catch {}

      // Create issue record (best effort)
      const isImg = file.type.match(/^image\//);
      fetch(`${API}/repos/${OWNER}/${REPO}/issues`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          title: `Upload: ${cleanName}`,
          body: isImg
            ? `![${cleanName}](${rawUrl})\n\nUploaded via [GitHub Pages](https://${OWNER}.github.io/${REPO})`
            : `${cleanName}\n${rawUrl}\n\nUploaded via [GitHub Pages](https://${OWNER}.github.io/${REPO})`
        })
      }).catch(() => {});

      // Reset
      selectedFile = null;
      emptyState.classList.remove('hidden');
      previewArea.classList.add('hidden');
      previewImg.src = '';
      fileInfo.classList.add('hidden');
      previewImg.classList.remove('hidden');

    } catch (err) {
      showStatus(err.message, 'error');
    }
    uploadBtn.disabled = false;
  };
  reader.readAsDataURL(file);
});

// Copy & Open
copyBtn.addEventListener('click', async () => {
  const url = urlDisplay.textContent;
  try { await navigator.clipboard.writeText(url); } catch { return; }
  copyBtn.textContent = '已复制!';
  copyBtn.classList.add('copied');
  setTimeout(() => { copyBtn.textContent = '复制链接'; copyBtn.classList.remove('copied'); }, 2000);
});

openBtn.addEventListener('click', () => window.open(urlDisplay.textContent, '_blank'));

// Helpers
function showStatus(msg, type) { statusEl.textContent = msg; statusEl.className = 'status show ' + type; }
function hideStatus() { statusEl.className = 'status'; }
</script>
</body>
</html>
